    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f9fc;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #4a90e2, #ff4b8b);
            padding: 60px 20px 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Language Switch */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            background: white;
            color: #0078ff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        /* Logo */
        .logo {
            width: 90px;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 34px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 17px;
            opacity: 0.95;
            margin: 4px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 26px;
            background: white;
            color: #0078ff;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn:hover {
            background: #e6f0ff;
        }

        .section {
            padding: 45px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .section h2 {
            text-align: center;
            margin-bottom: 26px;
            font-size: 26px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card h3 {
            margin-top: 0;
            color: #0078ff;
        }

        /* Demo Section */
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            align-items: start;
        }

        .demo-img {
            width: 100%;
            max-width: 320px;
            display: block;
            margin: 0 auto;
            border-radius: 18px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .demo-caption {
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        footer {
            text-align: center;
            padding: 26px;
            background: #eef3f8;
            margin-top: 30px;
            font-size: 13px;
        }

        /* Language visibility */
        .en { display: none; }
        .lang-en .en { display: block; }
        .lang-en .zh { display: none; }
    </style>
